<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام التمرين</title>
    <style>
        body { background: #111; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #222; padding: 20px; border-radius: 10px; border: 1px solid #444; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { width: 100%; padding: 10px; background: red; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="overlay">
        <h1 style="color: red;">💪 نظام التمرين</h1>
        <form id="setup-form" class="card" action="https://formspree.io/f/joadmazen999@gmail.com" method="POST">
            <h2>🚀 أبطال التحدي</h2>
            <input type="text" name="name" placeholder="الاسم" required>
            <input type="number" name="age" placeholder="السن" required>
            <input type="number" name="height" placeholder="الطول" required>
            <input type="number" name="weight" placeholder="الوزن" required>
            <select name="goal" id="goal">
                <option value="bulk">تضخيم (Bulking)</option>
                <option value="cut">تنشيف (Cutting)</option>
            </select>
            <button type="submit">إرسال البيانات</button>
        </form>
    </div>
</body>
</html>
